<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARK EDUS</title>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
}

body{
    font-family:Arial, sans-serif;
    margin:0;
    color:#0f172a;

    background-image:
        linear-gradient(
            rgba(244, 247, 252, 0.18),
            rgba(244, 247, 252, 0.18)
        ),
        url("{{ url_for('static', filename='img/fundo-login.png') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.login-area{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    background:rgba(255,255,255,.94);
    width:100%;
    max-width:450px;
    padding:40px;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(15,23,42,.16);
    border:1px solid rgba(255,255,255,.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
}

/* ======= LOGO ======= */

.logo{
    width:90px;
    height:90px;
    margin:0 auto 22px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:90px;
    height:90px;
    object-fit:contain;
    display:block;
}

/* ==================== */

h1{
    color:#1e3a8a;
    text-align:center;
    margin:0;
    font-size:38px;
    letter-spacing:.5px;
}

.subtitulo{
    text-align:center;
    color:#64748b;
    margin-top:12px;
    margin-bottom:35px;
    font-size:16px;
}

label{
    font-weight:600;
    display:block;
    margin-bottom:8px;
    color:#334155;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:22px;
    border:1px solid #cbd5e1;
    border-radius:14px;
    font-size:15px;
    color:#0f172a;
    background:rgba(255,255,255,.92);
    transition:.2s;
}

input::placeholder{
    color:#94a3b8;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
    background:#fff;
}

button{
    width:100%;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:#fff;
    border:none;
    padding:16px;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.25);
}

.esqueci{
    text-align:center;
    margin-top:18px;
}

.esqueci a{
    color:#1e3a8a;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
}

.esqueci a:hover{
    text-decoration:underline;
}

.info{
    margin-top:30px;
    background:rgba(239,246,255,.92);
    border:1px solid #dbeafe;
    border-radius:14px;
    padding:18px;
    color:#1e3a8a;
    font-size:14px;
    line-height:1.6;
}

.info strong{
    color:#1e40af;
}

@media(max-width:500px){

    body{
        background-attachment:scroll;
        background-position:center;
    }

    .login-area{
        padding:20px;
    }

    .card{
        padding:30px 25px;
        border-radius:20px;
    }

    h1{
        font-size:32px;
    }

    .logo{
        width:80px;
        height:80px;
    }

    .logo img{
        width:80px;
        height:80px;
    }
}
</style>
</head>

<body>

<div class="login-area">

    <div class="card">

        <div class="logo">
            <img
                src="{{ url_for('static', filename='img/logo-arkedus.png') }}"
                alt="ARK EDUS"
            >
        </div>

        <h1>ARK EDUS</h1>

        <p class="subtitulo">
            Plataforma Educacional
        </p>

        <form method="POST" action="{{ url_for('login') }}">

            <label for="email">Usuário / E-mail</label>

            <input
                type="text"
                id="email"
                name="email"
                placeholder="Digite seu usuário ou e-mail"
                autocomplete="username"
                required
            >

            <label for="senha">Senha</label>

            <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <div class="esqueci">
            <a href="{{ url_for('esqueci_senha') }}">
                Esqueceu a senha?
            </a>
        </div>

        <div class="info">
            <strong>Acesso inicial:</strong> admin<br>
            <strong>Senha inicial:</strong> admin123
        </div>

    </div>

</div>

</body>
</html>
