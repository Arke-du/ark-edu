<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Turma</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
            color: #0f172a;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 40px 55px;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.25);
        }

        header h1 {
            margin: 0;
            font-size: 38px;
        }

        header p {
            margin-top: 10px;
            font-size: 18px;
            opacity: 0.9;
        }

        .container {
            padding: 32px;
        }

        .voltar {
            display: inline-block;
            margin-bottom: 22px;
            color: #1e3a8a;
            text-decoration: none;
            font-weight: bold;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            max-width: 850px;
            margin: auto;
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.06);
            border: 1px solid #e5e7eb;
        }

        .card h2 {
            margin: 0;
            font-size: 28px;
            color: #111827;
        }

        .descricao {
            margin-top: 8px;
            margin-bottom: 30px;
            color: #64748b;
            font-size: 16px;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
            background: white;
        }

        input:focus,
        select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .acoes {
            display: flex;
            gap: 12px;
            margin-top: 35px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-salvar {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
        }

        .btn-salvar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-cancelar {
            background: white;
            color: #1e3a8a;
            border: 1px solid #cbd5e1;
        }

        .btn-cancelar:hover {
            background: #f8fafc;
        }

        @media (max-width: 768px) {

            header {
                padding: 35px 25px;
            }

            header h1 {
                font-size: 32px;
            }

            .container {
                padding: 22px;
            }

            .card {
                padding: 25px;
            }

            .acoes {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Editar Turma</h1>
    <p>Atualize as informações da turma cadastrada.</p>
</header>

<div class="container">

    <a href="/turmas" class="voltar">
        ← Voltar para turmas
    </a>

    <div class="card">

        <h2>Dados da turma</h2>

        <p class="descricao">
            Edite os dados abaixo e clique em
            <strong>Salvar Alterações</strong>.
        </p>

        <form action="/atualizar_turma/{{ turma[0] }}" method="POST">

            <label>Nome da turma:</label>

            <input
                type="text"
                name="nome"
                value="{{ turma[1] }}"
                required
            >

            <label>Ano/Série:</label>

            <input
                type="text"
                name="ano"
                value="{{ turma[2] }}"
                required
            >

            <label>Turno:</label>

            <select name="turno" required>

                <option
                    value="Matutino"
                    {% if turma[3] == "Matutino" %}selected{% endif %}
                >
                    Matutino
                </option>

                <option
                    value="Vespertino"
                    {% if turma[3] == "Vespertino" %}selected{% endif %}
                >
                    Vespertino
                </option>

                <option
                    value="Noturno"
                    {% if turma[3] == "Noturno" %}selected{% endif %}
                >
                    Noturno
                </option>

            </select>

            <div class="acoes">

                <a href="/turmas" class="btn btn-cancelar">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-salvar">
                    Salvar Alterações
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
