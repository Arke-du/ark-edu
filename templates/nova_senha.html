<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6fb;
}

.area {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    background: white;
    width: 100%;
    max-width: 430px;
    padding: 40px;
    border-radius: 22px;
    box-shadow: 0 12px 35px rgba(15, 23, 42, 0.10);
}

h1 {
    color: #1e3a8a;
    text-align: center;
    margin-top: 0;
    margin-bottom: 10px;
}

p {
    text-align: center;
    color: #64748b;
    margin-bottom: 30px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #0f172a;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: #2563eb;
}

button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

.voltar {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #1e3a8a;
    font-weight: bold;
    text-decoration: none;
}

.voltar:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="area">

    <div class="card">

        <h1>Redefinir Senha</h1>

        <p>Digite sua nova senha para continuar.</p>

        <form method="POST" action="{{ url_for('salvar_senha_usuario') }}">

            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="codigo" value="{{ codigo }}">

            <label for="nova_senha">
                Nova senha
            </label>

            <input
                type="password"
                id="nova_senha"
                name="nova_senha"
                minlength="4"
                required
            >

            <label for="confirmar_senha">
                Confirmar senha
            </label>

            <input
                type="password"
                id="confirmar_senha"
                name="confirmar_senha"
                minlength="4"
                required
            >

            <button type="submit">
                Salvar nova senha
            </button>

        </form>

        <a href="{{ url_for('login') }}" class="voltar">
            ← Voltar para o login
        </a>

    </div>

</div>

</body>
</html>
